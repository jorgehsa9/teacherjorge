<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">

    <style>
        /* Estilos específicos para o jogo de Anagramas, complementando style.css */
        .lesson-content { /* Garante padding no conteúdo principal */
             padding: 30px 40px;
        }

        #game-container-anagrams { /* Renomeado para evitar conflito */
            background-color: var(--section-even-bg);
            padding: 2rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 600px;
            text-align: center;
            margin: 20px auto;
            box-shadow: 0 3px 8px var(--shadow-color);
        }

        #difficulty-selector {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        #difficulty-selector h3 {
             margin-top: 0;
             margin-bottom: 1rem;
             font-size: 1.2em;
             color: var(--primary-color);
        }
         body.dark-mode #difficulty-selector h3 {
             color: var(--secondary-color);
         }

        .difficulty-button {
            padding: 8px 15px;
            margin: 0 5px 10px 5px;
            border: 1px solid var(--border-color);
            background-color: var(--white-color);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.1s ease;
        }
         body.dark-mode .difficulty-button {
             background-color: var(--section-even-bg);
             border-color: var(--border-color);
             color: var(--text-color);
         }

        .difficulty-button.active {
            background-color: var(--primary-color);
            color: var(--button-text-color);
            border-color: var(--primary-color);
            font-weight: bold;
            transform: scale(1.05);
        }
        body.dark-mode .difficulty-button.active {
            background-color: var(--secondary-color);
            color: var(--button-text-color);
            border-color: var(--secondary-color);
        }


        #scrambled-word {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 0.2em;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background-color: var(--section-odd-bg);
            border: 1px dashed var(--border-color);
            border-radius: 0.375rem;
            display: inline-block;
            user-select: none;
        }
         body.dark-mode #scrambled-word {
             color: var(--secondary-color);
             background-color: var(--section-odd-bg);
             border-color: var(--border-color);
         }

        #answer-input {
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 6px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 1rem;
            background-color: var(--white-color);
            color: var(--text-color);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
         body.dark-mode #answer-input {
             background-color: var(--bg-color);
         }

        #answer-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px hsla(from var(--secondary-color) h s l / 0.2);
        }
         /* Estilos para feedback no input */
         #answer-input.correct {
            border-color: var(--success-color);
            background-color: var(--success-bg-light);
        }
        #answer-input.incorrect {
            border-color: var(--danger-color);
            background-color: var(--danger-bg-light);
        }

        #feedback {
             font-weight: 600;
             min-height: 1.5rem;
             margin-top: 0.5rem;
             margin-bottom: 1rem;
        }
        .feedback-correct { color: var(--success-color); }
        .feedback-incorrect { color: var(--danger-color); }
        .feedback-prompt { color: var(--text-muted); }

        #hint-container {
            margin-bottom: 1.5rem;
            font-size: 0.9em;
            color: var(--text-muted);
            min-height: 1.25rem;
        }

        /* Botões de Ação */
        .action-buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 1rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .action-button {
             padding: 10px 20px;
             font-size: 0.95em;
             font-weight: 500;
             border: none;
             border-radius: 6px;
             cursor: pointer;
             transition: background-color 0.3s ease, transform 0.1s ease, opacity 0.3s ease;
             color: var(--button-text-color);
        }
         body.dark-mode .action-button {
             color: var(--button-text-color);
         }

        /* Cores específicas dos botões */
        #check-button { background-color: var(--success-color); }
        #check-button:hover:not(:disabled) { background-color: #218838; }
        #hint-button { background-color: #ffc107; color: #212529; }
        #hint-button:hover:not(:disabled) { background-color: #e0a800; }
        #next-button { background-color: var(--primary-color); }
        #next-button:hover:not(:disabled) { background-color: var(--secondary-color); }
        #restart-button { background-color: var(--text-muted); }
        #restart-button:hover:not(:disabled) { background-color: var(--text-color); }

        .action-button:active:not(:disabled) {
            transform: scale(0.97);
        }
        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #score-container {
            margin-top: 1.5rem;
            font-size: 1.1em;
            color: var(--text-muted);
        }
         #score-container #score {
             font-weight: bold;
             color: var(--primary-color);
         }
          body.dark-mode #score-container #score {
             color: var(--secondary-color);
         }

    </style>
    <style>
        /* INJETADO: ISOLAMENTO DO JOGO */
        .lesson-header, #floating-video, #floating-notepad, #floating-chat, aside, footer {
            display: none !important;
        }
        .container {
            padding: 0 !important;
            margin: 0 !important;
            max-width: 100% !important;
            box-shadow: none !important;
            border: none !important;
        }
        .lesson-content {
            padding: 0 !important;
            margin: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 100vh !important;
        }
        body {
            background: transparent !important;
            overflow: hidden !important;
        }
        div[id^="game-container"] {
            margin: 0 auto !important;
            max-height: 100vh !important;
            overflow-y: auto !important;
        }
    </style>
</head>
<body>

    <div id="floating-video"> <div class="video-container"> <iframe src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe> </div> </div>
    <div id="floating-notepad"> <textarea id="notepad-area" placeholder="Suas anotações..."></textarea> </div>
    <div id="floating-chat"> <div id="chatbox"> <div id="chatOutput"> <div class="message bot-message">Olá! Eu sou o George. Como posso ajudar com seu inglês hoje?</div> </div> <div id="chatInputContainer"> <input type="text" id="chatInput" placeholder="Digite sua dúvida aqui..." autocomplete="off"> <button id="sendButton">Enviar</button> </div> </div> </div>
    <div class="container">
        <header class="lesson-header">
            <h1>Jogo: Anagramas</h1>
            <div class="header-controls">
                <a href="index.html" id="home-index-btn" title="Voltar ao Índice"><i class="fas fa-home"></i></a>
                <a href="index.html#games-section" id="prev-lesson-btn" title="Voltar aos Jogos"><i class="fas fa-arrow-left"></i></a>
                <a href="index.html#games-section" id="next-lesson-btn" title="Voltar aos Jogos"><i class="fas fa-arrow-right"></i></a>
                <button id="theme-toggle-btn" title="Alternar Modo Claro/Escuro"><i class="fas fa-moon"></i><i class="fas fa-sun"></i></button>
                <button id="video-toggle-btn" title="Mostrar/Esconder Vídeo"><i class="fas fa-video"></i></button>
                <button id="notepad-toggle-btn" title="Mostrar/Esconder Bloco de Notas"><i class="fas fa-pencil-alt"></i></button>
                <button id="chat-toggle-btn" title="Abrir Chat"><i class="fas fa-robot"></i></button>
            </div>
        </header>
        <main class="lesson-content">

            <div id="game-container-anagrams">

                <div id="difficulty-selector">
                    <h3>Escolha a Dificuldade:</h3>
                    <button class="difficulty-button active" data-difficulty="1">Nível 1</button>
                    <button class="difficulty-button" data-difficulty="2">Nível 2</button>
                    <button class="difficulty-button" data-difficulty="3">Nível 3</button>
                    <button class="difficulty-button" data-difficulty="4">Nível 4</button>
                    <button class="difficulty-button" data-difficulty="5">Nível 5</button>
                </div>

                <p class="text-gray-600 mb-4">Organize as letras para formar uma palavra em inglês:</p>

                <div id="scrambled-word-container" class="mb-6">
                    <span id="scrambled-word"></span> </div>

                <div>
                    <input type="text" id="answer-input" placeholder="Digite sua resposta aqui">
                </div>

                <div id="feedback" class="min-h-[1.5rem]">
                      </div>

                <div id="hint-container" class="min-h-[1.25rem]">
                       </div>

                <div class="action-buttons-container">
                    <button id="check-button" class="action-button">
                        <i class="fas fa-check"></i> Verificar
                    </button>
                    <button id="hint-button" class="action-button">
                        <i class="fas fa-lightbulb"></i> Dica
                    </button>
                    <button id="next-button" class="action-button">
                        <i class="fas fa-forward"></i> Próxima
                    </button>
                     <button id="restart-button" class="action-button" title="Começar de novo">
                        <i class="fas fa-redo"></i> Reiniciar
                    </button>
                </div>

                 <div id="score-container">
                    Pontuação: <span id="score" class="font-bold">0</span>
                </div>

            </div> </main> </div> <script>
        // Adiciona um listener para garantir que o DOM está carregado
        document.addEventListener('DOMContentLoaded', () => {

            // --- Lógica do Tema e Painéis Flutuantes ---
            // ... (código mantido igual ao anterior) ...
             const themeToggleBtn = document.getElementById('theme-toggle-btn');
            const notepadToggleBtn = document.getElementById('notepad-toggle-btn');
            const videoToggleBtn = document.getElementById('video-toggle-btn');
            const chatToggleBtn = document.getElementById('chat-toggle-btn');
            const floatingNotepad = document.getElementById('floating-notepad');
            const floatingVideo = document.getElementById('floating-video');
            const floatingChat = document.getElementById('floating-chat');
            const notepadArea = document.getElementById('notepad-area');
            const notepadStorageKey = 'notepadContent_anagrams_game';

            const applyTheme = (theme) => { if (theme === 'dark') { document.body.classList.add('dark-mode'); } else { document.body.classList.remove('dark-mode'); } };
            const currentTheme = localStorage.getItem('theme') || 'light';
            applyTheme(currentTheme);
            if (themeToggleBtn) { themeToggleBtn.addEventListener('click', () => { const newTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark'; applyTheme(newTheme); localStorage.setItem('theme', newTheme); }); }
            const savedNotepadContent = localStorage.getItem(notepadStorageKey);
            if (savedNotepadContent && notepadArea) { notepadArea.value = savedNotepadContent; }
            if (notepadArea) { notepadArea.addEventListener('input', () => { localStorage.setItem(notepadStorageKey, notepadArea.value); }); }
            const setupPanelToggle = (button, panelElement, bodyClass) => { if (button && panelElement) { button.addEventListener('click', () => { document.body.classList.toggle(bodyClass); button.classList.toggle('active'); if (bodyClass === 'chat-visible' && document.body.classList.contains(bodyClass)) { const chatInput = document.querySelector('#floating-chat #chatInput'); if (chatInput) setTimeout(() => chatInput.focus(), 50); } }); } };
            setupPanelToggle(notepadToggleBtn, floatingNotepad, 'notepad-visible');
            setupPanelToggle(videoToggleBtn, floatingVideo, 'video-visible');
            setupPanelToggle(chatToggleBtn, floatingChat, 'chat-visible');
            const chatInput = document.getElementById('chatInput');
            const chatOutput = document.getElementById('chatOutput');
            const sendButton = document.getElementById('sendButton');
            const WORKER_URL = 'https://george.jorgehsantonio.workers.dev/';
            if (chatInput && chatOutput && sendButton) { function addMessage(message, className) { const messageDiv = document.createElement('div'); messageDiv.classList.add('message', className); messageDiv.textContent = message; chatOutput.appendChild(messageDiv); messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' }); return messageDiv; } async function sendMessageToWorker() { const userMessage = chatInput.value.trim(); if (!userMessage) return; addMessage(userMessage, 'user-message'); chatInput.value = ''; chatInput.focus(); const typingDiv = addMessage("George está digitando...", "typing-indicator"); chatInput.disabled = true; sendButton.disabled = true; try { const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', }, body: JSON.stringify({ message: userMessage }), }); if (typingDiv && chatOutput.contains(typingDiv)) typingDiv.remove(); if (!response.ok) { let errorText = `Erro ${response.status}: ${response.statusText}`; try { const errorData = await response.json(); errorText = `Erro do George: ${errorData.error || errorText}`; } catch (e) { /* Ignora */ } addMessage(errorText, 'error-message'); } else { const data = await response.json(); if (data.reply) { addMessage(data.reply, 'bot-message'); } else if (data.error) { addMessage(`Erro do George: ${data.error}`, 'error-message'); } else { addMessage(`George: Resposta inesperada.`, 'error-message'); } } } catch (error) { console.error('Erro ao enviar mensagem:', error); if (typingDiv && chatOutput.contains(typingDiv)) { typingDiv.remove(); } addMessage(`Erro de comunicação. Verifique sua conexão.`, 'error-message'); } finally { chatInput.disabled = false; sendButton.disabled = false; chatInput.focus(); } } sendButton.addEventListener('click', sendMessageToWorker); chatInput.addEventListener('keypress', function(event) { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessageToWorker(); } }); } else { console.warn("Elementos do chat flutuante não encontrados."); }


            // --- Lógica Específica do Jogo de Anagramas ---

            // Listas de palavras por dificuldade (EXPANDIDAS E REVISADAS)
            const wordLists = {
                1: ["CAT", "DOG", "SUN", "RUN", "FLY", "EAT", "SEE", "KEY", "CAR", "BUS", "SKY", "CRY", "TRY", "BOY", "GIRL", "MAN", "OLD", "NEW", "SAD", "BIG", "HOT", "ICE", "MAP", "BOX", "EGG", "PEN", "HAT", "CAP", "CUP", "ASK", "GET", "USE", "BED", "FUN", "DAY", "WAY"], // 3 letras (~35)
                2: ["BOOK", "READ", "WORK", "PLAY", "TREE", "FISH", "BIRD", "BLUE", "HOME", "FOOD", "GOOD", "LIKE", "LOVE", "LIVE", "HAVE", "MAKE", "DOOR", "DESK", "RAIN", "SNOW", "COLD", "WARM", "BANK", "PARK", "ROAD", "STOP", "WAIT", "HELP", "WALK", "TALK", "GIVE", "TAKE", "OPEN", "CITY", "NAME", "TIME", "YEAR", "WEEK"], // 4 letras (~38)
                3: ["APPLE", "TABLE", "CHAIR", "WATER", "HAPPY", "SMILE", "HOUSE", "MOUSE", "GREEN", "STUDY", "PAPER", "BREAD", "JUICE", "MONEY", "MUSIC", "PIZZA", "NIGHT", "LIGHT", "WHITE", "BLACK", "BROWN", "DRINK", "SLEEP", "SPEAK", "THINK", "WATCH", "LEARN", "START", "STORE", "SMALL", "LARGE", "EARLY", "LATER", "HELLO", "AGAIN"], // 5 letras (~35)
                4: ["ORANGE", "BANANA", "FRIEND", "FAMILY", "SCHOOL", "PURPLE", "YELLOW", "LISTEN", "WRITE", "GUITAR", "SUMMER", "WINTER", "SPRING", "STREET", "NUMBER", "LETTER", "PENCIL", "WINDOW", "PLEASE", "THANKS", "ALWAYS", "BEFORE", "AFTER", "COFFEE", "CHEESE", "MARKET", "DOCTOR", "POLICE", "OFFICE", "MINUTE", "PERSON", "PEOPLE"], // 6 letras (~32)
                5: ["COMPUTER", "KEYBOARD", "LANGUAGE", "ENGLISH", "VOCABULARY", "GRAMMAR", "BEAUTIFUL", "INTEREST", "DIFFICULT", "REMEMBER", "UNDERSTAND", "QUESTION", "ANSWER", "EXAMPLE", "MORNING", "EVENING", "WEEKEND", "WEATHER", "HOLIDAY", "VACATION", "LIBRARY", "HOSPITAL", "STUDENT", "TEACHER", "PROBLEM", "WELCOME", "COUNTRY", "CAPITAL", "AIRPORT", "STATION", "RESTAURANT", "IMPORTANT"] // 7+ letras (~32)
            };

            // Elementos do DOM do Jogo
            const scrambledWordDisplay = document.getElementById('scrambled-word');
            const answerInput = document.getElementById('answer-input');
            const feedbackDisplay = document.getElementById('feedback');
            const hintContainer = document.getElementById('hint-container');
            const checkButton = document.getElementById('check-button');
            const hintButton = document.getElementById('hint-button');
            const nextButton = document.getElementById('next-button');
            const restartButton = document.getElementById('restart-button');
            const scoreDisplay = document.getElementById('score');
            const difficultyButtons = document.querySelectorAll('.difficulty-button');

            // Variáveis de Estado do Jogo
            let currentWord = "";
            let scrambled = "";
            let score = 0;
            let hintUsed = false;
            let currentDifficulty = 1;

            // Função para embaralhar
            function scrambleWord(word) { /* ... (código mantido) ... */ }
             function scrambleWord(word) {
                let letters = word.split('');
                let scrambledWord;
                do {
                    for (let i = letters.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [letters[i], letters[j]] = [letters[j], letters[i]];
                    }
                    scrambledWord = letters.join('');
                } while (scrambledWord === word && word.length > 1);
                return scrambledWord;
            }

            // Função para iniciar nova rodada
            function nextRound() { /* ... (código mantido) ... */ }
             function nextRound() {
                const currentWordList = wordLists[currentDifficulty] || wordLists[1];
                if (!currentWordList || currentWordList.length === 0) {
                     scrambledWordDisplay.textContent = "ERRO";
                     feedbackDisplay.textContent = "Nenhuma palavra encontrada para este nível.";
                     feedbackDisplay.className = 'feedback-incorrect';
                     console.error("Lista de palavras vazia ou inválida para o nível:", currentDifficulty);
                     return;
                }

                const randomIndex = Math.floor(Math.random() * currentWordList.length);
                currentWord = currentWordList[randomIndex].toUpperCase();
                scrambled = scrambleWord(currentWord);

                scrambledWordDisplay.textContent = scrambled;
                answerInput.value = '';
                answerInput.disabled = false;
                answerInput.classList.remove('correct', 'incorrect');
                feedbackDisplay.innerHTML = ' ';
                feedbackDisplay.className = '';
                hintContainer.innerHTML = ' ';
                checkButton.disabled = false;
                hintButton.disabled = false;
                hintUsed = false;
                answerInput.focus();
            }

            // Função para verificar resposta
            function checkAnswer() { /* ... (código mantido) ... */ }
             function checkAnswer() {
                const userAnswer = answerInput.value.trim().toUpperCase();

                if (userAnswer === "") {
                     feedbackDisplay.textContent = 'Por favor, digite uma resposta.';
                     feedbackDisplay.className = 'feedback-prompt';
                    return;
                }

                answerInput.disabled = true;
                checkButton.disabled = true;
                hintButton.disabled = true;

                if (userAnswer === currentWord) {
                    feedbackDisplay.textContent = 'Correto!';
                    feedbackDisplay.className = 'feedback-correct';
                    answerInput.classList.add('correct');
                    answerInput.classList.remove('incorrect');
                    if (!hintUsed) {
                        score++;
                        scoreDisplay.textContent = score;
                    }
                } else {
                    feedbackDisplay.textContent = `Incorreto. A palavra era: ${currentWord}`;
                    feedbackDisplay.className = 'feedback-incorrect';
                    answerInput.classList.add('incorrect');
                     answerInput.classList.remove('correct');
                }
            }


            // Função para mostrar dica
            function showHint() { /* ... (código mantido) ... */ }
             function showHint() {
                if (!currentWord || hintUsed) return;

                hintContainer.textContent = `Dica: A palavra começa com a letra '${currentWord[0]}'.`;
                hintButton.disabled = true;
                hintUsed = true;
            }

             // Função para mudar a dificuldade
             function changeDifficulty(newDifficulty) { /* ... (código mantido) ... */ }
              function changeDifficulty(newDifficulty) {
                 currentDifficulty = parseInt(newDifficulty, 10);
                 difficultyButtons.forEach(btn => {
                     btn.classList.toggle('active', btn.dataset.difficulty == currentDifficulty);
                 });
                 console.log("Dificuldade alterada para:", currentDifficulty);
                 restartGame(); // Reinicia para garantir nova palavra da dificuldade certa
             }

            // Função para reiniciar o jogo
            function restartGame() { /* ... (código mantido) ... */ }
             function restartGame() {
                score = 0;
                scoreDisplay.textContent = score;
                nextRound();
            }


            // --- Event Listeners do Jogo ---
            checkButton.addEventListener('click', checkAnswer);
            answerInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter' && !answerInput.disabled) {
                    checkAnswer();
                }
            });
            hintButton.addEventListener('click', showHint);
            nextButton.addEventListener('click', nextRound);
            restartButton.addEventListener('click', restartGame);

             // Adiciona listeners para os botões de dificuldade
             difficultyButtons.forEach(button => {
                 button.addEventListener('click', () => {
                     changeDifficulty(button.dataset.difficulty);
                 });
             });

            // --- Inicialização do Jogo ---
            changeDifficulty(currentDifficulty); // Inicia o jogo com a dificuldade padrão (1)

        }); // Fim do DOMContentLoaded
    </script>

</body>
