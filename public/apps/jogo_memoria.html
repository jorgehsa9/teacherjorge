    <style>
        /* Estilos específicos para o Jogo da Memória, complementando style.css */
        .lesson-content {
             padding: 30px 40px;
        }

        #game-container-memory {
            background-color: var(--section-even-bg);
            padding: 2rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin: 20px auto;
            box-shadow: 0 3px 8px var(--shadow-color);
        }

        /* Seletor de Dificuldade */
        #difficulty-selector-memory {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }
        #difficulty-selector-memory h3 {
             margin-top: 0;
             margin-bottom: 1rem;
             font-size: 1.2em;
             color: var(--primary-color);
        }
        body.dark-mode #difficulty-selector-memory h3 {
             color: var(--secondary-color);
         }
        .difficulty-button-memory {
            padding: 8px 15px;
            margin: 0 5px 10px 5px;
            border: 1px solid var(--border-color);
            background-color: var(--white-color);
            color: var(--text-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.1s ease;
        }
        body.dark-mode .difficulty-button-memory {
             background-color: var(--section-even-bg);
             border-color: var(--border-color);
             color: var(--text-color);
         }
        .difficulty-button-memory.active {
            background-color: var(--primary-color);
            color: var(--button-text-color);
            border-color: var(--primary-color);
            font-weight: bold;
            transform: scale(1.05);
        }
        body.dark-mode .difficulty-button-memory.active {
            background-color: var(--secondary-color);
            color: var(--button-text-color);
            border-color: var(--secondary-color);
        }

        /* Informações do Jogo (Apenas Tentativas) */
        .game-info {
            display: flex;
            justify-content: center; /* Centraliza tentativas */
            margin-bottom: 1rem;
            font-size: 1.1em;
            color: var(--text-muted);
        }
        .game-info span {
            font-weight: bold;
            color: var(--text-color);
        }
         body.dark-mode .game-info span {
             color: var(--text-color);
         }

        /* Feedback */
        #feedback-memory {
             min-height: 1.5rem;
             margin-bottom: 1.5rem;
             font-weight: 600;
        }
        .feedback-correct { color: var(--success-color); }
        .feedback-incorrect { color: var(--danger-color); }
        .feedback-prompt { color: var(--text-muted); }

        /* Tabuleiro do Jogo */
        #game-board {
            display: grid;
            gap: 10px;
            margin: 0 auto;
            max-width: 100%;
            /* grid-template-columns definido via JS */
        }

        /* Estilo das Cartas */
        .card {
            aspect-ratio: 4 / 3;
            perspective: 1000px;
            cursor: pointer;
            background-color: transparent;
            border: none;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px var(--shadow-color);
            border-radius: 8px;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            padding: 5px;
            overflow: hidden;
            text-align: center;
            font-size: 0.9em;
            line-height: 1.3;
            word-break: break-word;
            border: 2px solid transparent; /* Adiciona borda transparente para espaço */
        }
        .card-front {
            background-color: var(--primary-color);
            color: var(--button-text-color);
            font-size: 2rem;
        }
        .card-back {
            background-color: var(--section-odd-bg);
            color: var(--text-color);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, border-color 0.3s ease; /* Transição para o verde */
        }
        .card-back img {
            max-width: 80%;
            max-height: 60%;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        /* Estilo para cartas combinadas */
        .card.matched .card-inner {
            transform: rotateY(180deg);
            cursor: default;
            box-shadow: 0 2px 5px var(--shadow-color);
        }
         .card.matched .card-back {
             background-color: var(--success-bg-light); /* Fundo verde claro */
             border-color: var(--success-color); /* Borda verde */
         }
         /* Garante que o clique seja desabilitado */
        .card.matched {
             pointer-events: none;
        }
        .card.disabled-click {
            pointer-events: none;
        }

        /* Botão Reiniciar */
        #reset-button-memory {
             margin-top: 1.5rem;
             padding: 10px 25px;
             font-size: 1em;
             font-weight: 500;
             border: none;
             border-radius: 6px;
             cursor: pointer;
             transition: background-color 0.3s ease, transform 0.1s ease;
             background-color: var(--secondary-color);
             color: var(--button-text-color);
        }
         body.dark-mode #reset-button-memory {
             color: var(--button-text-color);
         }
        #reset-button-memory:hover {
            background-color: var(--primary-color);
        }
        #reset-button-memory:active {
            transform: scale(0.98);
        }

        /* Modal de Fim de Jogo */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background-color: var(--container-bg);
            margin: auto;
            padding: 2rem;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 5px 15px var(--shadow-color);
            position: relative;
        }
         .modal-content h2 {
             color: var(--success-color);
             margin-bottom: 1rem;
             font-size: 1.8em;
         }
         .modal-content p {
             color: var(--text-color);
             margin-bottom: 1rem;
             font-size: 1.1em;
         }
         .modal-content strong {
             color: var(--primary-color);
             font-weight: bold;
         }
         body.dark-mode .modal-content strong {
             color: var(--secondary-color);
         }
         #play-again-button-memory {
             padding: 10px 25px;
             font-size: 1em;
             font-weight: 500;
             border: none;
             border-radius: 6px;
             cursor: pointer;
             transition: background-color 0.3s ease;
             background-color: var(--success-color);
             color: var(--button-text-color);
             margin-top: 1rem;
         }
         #play-again-button-memory:hover {
             background-color: #218838;
         }

    </style>
</head>

            const currentTheme = localStorage.getItem('theme') || 'light';

            setupPanelToggle(notepadToggleBtn, floatingNotepad, 'notepad-visible');

            const WORKER_URL = 'https://george.jorgehsantonio.workers.dev/';
            if (chatInput && chatOutput && sendButton) { function addMessage(message, className) { const messageDiv = document.createElement('div'); messageDiv.classList.add('message', className); messageDiv.textContent = message; chatOutput.appendChild(messageDiv); messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' }); return messageDiv; } async function sendMessageToWorker() { const userMessage = chatInput.value.trim(); if (!userMessage) return; addMessage(userMessage, 'user-message'); chatInput.value = ''; chatInput.focus(); const typingDiv = addMessage("George está digitando...", "typing-indicator"); chatInput.disabled = true; sendButton.disabled = true; try { const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', }, body: JSON.stringify({ message: userMessage }), }); if (typingDiv && chatOutput.contains(typingDiv)) typingDiv.remove(); if (!response.ok) { let errorText = `Erro ${response.status}: ${response.statusText}`; try { const errorData = await response.json(); errorText = `Erro do George: ${errorData.error || errorText}`; } catch (e) { /* Ignora */ } addMessage(errorText, 'error-message'); } else { const data = await response.json(); if (data.reply) { addMessage(data.reply, 'bot-message'); } else if (data.error) { addMessage(`Erro do George: ${data.error}`, 'error-message'); } else { addMessage(`George: Resposta inesperada.`, 'error-message'); } } } catch (error) { console.error('Erro ao enviar mensagem:', error); if (typingDiv && chatOutput.contains(typingDiv)) { typingDiv.remove(); } addMessage(`Erro de comunicação. Verifique sua conexão.`, 'error-message'); } finally { chatInput.disabled = false; sendButton.disabled = false; chatInput.focus(); } } sendButton.addEventListener('click', sendMessageToWorker); chatInput.addEventListener('keypress', function(event) { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessageToWorker(); } }); } else { console.warn("Elementos do chat flutuante não encontrados."); }

             function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

                card.dataset.matchId = item.matchId;

                const cardInner = document.createElement('div');
                cardInner.classList.add('card-inner');

                const cardBack = document.createElement('div');

                    textSpan.textContent = item.content;
                    cardBack.appendChild(textSpan);
                } else if (item.type === 'image') {

                    img.src = item.content;
                    img.alt = item.description || 'Imagem do jogo';
                    img.onerror = () => {
                        cardBack.innerHTML = '';
                        const errorSpan = document.createElement('span');
                        errorSpan.textContent = item.description || 'Erro Img';
                        errorSpan.style.color = 'var(--danger-color)';

                cardInner.appendChild(cardFront);

                card.appendChild(cardInner);

            }

             // Função para definir layout da grade
             function setGridLayout(numberOfCards) { /* ... (código mantido) ... */ }
              function setGridLayout(numberOfCards) {
                 let columns;
                 if (numberOfCards <= 8) columns = 4;
                 else if (numberOfCards <= 12) columns = 4;
                 else if (numberOfCards <= 16) columns = 4;
                 else if (numberOfCards <= 20) columns = 5;
                 else columns = 6;

                 gameBoard.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
                 gameBoard.style.maxWidth = `${columns * (90 + 10)}px`;
             }

            // Função para iniciar/reiniciar jogo
            function startGame() {
                currentPairSet = pairSets[currentDifficulty] || pairSets[1];
                if (!currentPairSet || currentPairSet.length === 0) {
                    console.error("Conjunto de pares inválido ou vazio para o nível:", currentDifficulty);
                    feedbackDisplay.textContent = "Erro: Não foi possível carregar as cartas.";
                    feedbackDisplay.className = 'feedback-incorrect';
                    gameBoard.innerHTML = '';
                    return;
                }

                firstCard = null;
                secondCard = null;
                lockBoard = false;
                matchedPairs = 0;
                attempts = 0;
                attemptsDisplay.textContent = attempts;
                feedbackDisplay.textContent = 'Escolha duas cartas!';
                feedbackDisplay.className = 'feedback-prompt';
                gameBoard.innerHTML = '';
                winModal.classList.remove('show');

                 setGridLayout(currentPairSet.length);

                const shuffledPairs = shuffle([...currentPairSet]);

                shuffledPairs.forEach(item => {
                    const cardElement = createCardElement(item);
                    gameBoard.appendChild(cardElement);
                });

                cards = gameBoard.querySelectorAll('.card');
            }

            // Função para clique na carta
            function handleCardClick() { /* ... (código mantido) ... */ }
             function handleCardClick() {
                if (lockBoard || this === firstCard || this.classList.contains('matched')) {
                    return;
                }
                this.classList.add('flipped');

                if (!firstCard) {
                    firstCard = this;
                    feedbackDisplay.textContent = 'Escolha a segunda carta.';
                    feedbackDisplay.className = 'feedback-prompt';
                    return;
                }

                secondCard = this;
                lockBoard = true;
                attempts++;
                attemptsDisplay.textContent = attempts;
                feedbackDisplay.textContent = 'Verificando...';
                feedbackDisplay.className = '';

                checkForMatch();
            }

            // Função para checar par
            function checkForMatch() { /* ... (código mantido) ... */ }
             function checkForMatch() {
                const isMatch = firstCard.dataset.matchId === secondCard.dataset.matchId;

                if (isMatch) {
                    feedbackDisplay.textContent = 'Par encontrado!';
                    feedbackDisplay.className = 'feedback-correct';
                    disableMatchedCards();
                } else {
                    feedbackDisplay.textContent = 'Não combinam. Tente novamente!';
                    feedbackDisplay.className = 'feedback-incorrect';
                    unflipCards();
                }
            }

            // Função para desabilitar cartas combinadas
            function disableMatchedCards() { /* ... (código mantido) ... */ }
             function disableMatchedCards() {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');

                matchedPairs++;
                resetTurn();

                if (matchedPairs === currentPairSet.length / 2) {
                    endGame();
                }
            }

            // Função para desvirar cartas
            function unflipCards() { /* ... (código mantido) ... */ }
             function unflipCards() {
                setTimeout(() => {
                    if (firstCard) firstCard.classList.remove('flipped');
                    if (secondCard) secondCard.classList.remove('flipped');
                    resetTurn();
                    feedbackDisplay.textContent = 'Escolha duas cartas!';
                    feedbackDisplay.className = 'feedback-prompt';
                }, 1200);
            }

            // Função para resetar turno
            function resetTurn() { /* ... (código mantido) ... */ }
             function resetTurn() {
                [firstCard, secondCard] = [null, null];
                lockBoard = false;
            }

            // Função para finalizar o jogo
            function endGame() {
                feedbackDisplay.textContent = 'Jogo Concluído!';
                feedbackDisplay.className = 'feedback-correct';
                finalPairsDisplay.textContent = `${matchedPairs} / ${currentPairSet.length / 2}`;
                finalAttemptsDisplay.textContent = attempts;
                winModal.classList.add('show');
            }

             // Função para mudar a dificuldade
             function changeDifficulty(newDifficulty) { /* ... (código mantido) ... */ }
              function changeDifficulty(newDifficulty) {
                 currentDifficulty = parseInt(newDifficulty, 10);
                 difficultyButtonsMemory.forEach(btn => {
                     btn.classList.toggle('active', btn.dataset.difficulty == currentDifficulty);
                 });
                 console.log("Dificuldade do Jogo da Memória alterada para:", currentDifficulty);
                 startGame();
             }

            // --- Event Listeners do Jogo ---
            resetButton.addEventListener('click', startGame);
            playAgainButton.addEventListener('click', startGame);
            difficultyButtonsMemory.forEach(button => {
                 button.addEventListener('click', () => {
                     changeDifficulty(button.dataset.difficulty);
                 });
             });

            // --- Inicialização ---
            changeDifficulty(currentDifficulty); // Inicia com nível 1

        }); // Fim do DOMContentLoaded
    </script>

</body>
</html>
